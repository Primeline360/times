<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#111827" />
<link rel="manifest" href="manifest.webmanifest" />
<title>Secure Attendance</title>
<style>
:root{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#f9fafb;background:#080b12}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#1f2937 0,#080b12 55%);padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom)}.app{max-width:560px;margin:auto;padding:24px 0 80px}.brand{display:flex;align-items:center;gap:12px;margin:8px 0 24px}.logo{width:48px;height:48px;border-radius:16px;background:#2563eb;display:grid;place-items:center;font-size:26px;box-shadow:0 12px 32px #2563eb55}.muted{color:#9ca3af}.card{background:#151922;border:1px solid #2a3140;border-radius:24px;padding:22px;margin-bottom:16px;box-shadow:0 18px 50px #0006}h1,h2,p{margin-top:0}h1{font-size:28px;margin-bottom:4px}h2{font-size:20px}.field{margin:14px 0}.field label{display:block;font-size:13px;color:#cbd5e1;margin-bottom:7px}.field input{width:100%;padding:15px 16px;border-radius:14px;border:1px solid #374151;background:#0d1119;color:white;font-size:17px;outline:none}.field input:focus{border-color:#3b82f6}.btn{width:100%;border:0;border-radius:16px;padding:16px;font-size:17px;font-weight:750;cursor:pointer;margin-top:10px}.primary{background:#2563eb;color:white}.success{background:#16a34a;color:white}.danger{background:#dc2626;color:white}.secondary{background:#293140;color:white}.ghost{background:transparent;color:#cbd5e1;border:1px solid #374151}.clock{font-size:48px;font-weight:800;letter-spacing:-2px;text-align:center;margin:8px 0}.date{text-align:center;color:#9ca3af}.status{text-align:center;margin:22px 0}.pill{display:inline-block;padding:8px 13px;border-radius:999px;background:#263043;color:#cbd5e1;font-size:13px}.tabs{position:fixed;bottom:0;left:0;right:0;background:#10141ddd;border-top:1px solid #2a3140;backdrop-filter:blur(16px);display:flex;justify-content:center;padding:8px max(12px,env(safe-area-inset-right)) calc(8px + env(safe-area-inset-bottom))}.tabs button{max-width:280px;flex:1;background:transparent;border:0;color:#9ca3af;padding:10px;font-weight:700}.tabs button.active{color:#60a5fa}.row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid #2a3140}.row:last-child{border-bottom:0}.type{font-weight:750}.time{font-size:14px;color:#9ca3af}.empty{text-align:center;color:#9ca3af;padding:30px 0}.hidden{display:none!important}.notice{padding:12px 14px;border-radius:14px;background:#312e1d;color:#fde68a;font-size:13px;margin:12px 0}.error{background:#3b1717;color:#fecaca}.ok{background:#15351f;color:#bbf7d0}.pin{text-align:center;letter-spacing:12px;font-size:24px}.topline{display:flex;justify-content:space-between;align-items:center}.small{font-size:12px}.summary{display:grid;grid-template-columns:1fr 1fr;gap:12px}.stat{background:#0e131c;border-radius:16px;padding:16px}.stat b{display:block;font-size:24px;margin-top:4px}
</style>
</head>
<body>
<div class="app">
  <div class="brand"><div class="logo">✓</div><div><h1>Secure Attendance</h1><div class="muted">Private biometric time clock</div></div></div>

  <section id="enrol" class="card hidden">
    <h2>Set up this phone</h2><p class="muted">Register one employee on this device.</p>
    <div class="field"><label>Full name</label><input id="name" autocomplete="name" /></div>
    <div class="field"><label>Employee number</label><input id="employeeId" autocomplete="off" /></div>
    <div class="field"><label>Create 6-digit PIN</label><input id="newPin" class="pin" inputmode="numeric" maxlength="6" type="password" /></div>
    <div class="field"><label>Confirm PIN</label><input id="confirmPin" class="pin" inputmode="numeric" maxlength="6" type="password" /></div>
    <div id="enrolMsg"></div>
    <button class="btn primary" onclick="enrol()">Enable secure attendance</button>
  </section>

  <section id="lock" class="card hidden">
    <h2>Unlock attendance</h2><p class="muted" id="welcome"></p>
    <button id="bioUnlock" class="btn primary" onclick="unlockBiometric()">Unlock with biometrics</button>
    <div class="field"><label>Or enter your 6-digit PIN</label><input id="pin" class="pin" inputmode="numeric" maxlength="6" type="password" /></div>
    <div id="lockMsg"></div><button class="btn secondary" onclick="unlockPin()">Unlock with PIN</button>
  </section>

  <main id="main" class="hidden">
    <section id="clockView">
      <div class="card">
        <div class="topline"><div><b id="employeeName"></b><div class="muted small" id="employeeCode"></div></div><button class="btn ghost" style="width:auto;padding:9px 12px;margin:0" onclick="lockApp()">Lock</button></div>
        <div class="clock" id="clock">--:--</div><div class="date" id="date"></div>
        <div class="status"><span class="pill" id="status">Not clocked in</span></div>
        <button id="punchButton" class="btn success" onclick="punch()">Clock In</button>
        <div id="punchMsg"></div>
      </div>
      <div class="card summary"><div class="stat"><span class="muted small">This week</span><b id="weekHours">0h 00m</b></div><div class="stat"><span class="muted small">Punches</span><b id="weekPunches">0</b></div></div>
    </section>
    <section id="historyView" class="hidden"><div class="card"><h2>This week's history</h2><div id="history"></div></div><button class="btn ghost" onclick="exportData()">Export backup</button></section>
    <nav class="tabs"><button id="clockTab" class="active" onclick="showTab('clock')">Clock</button><button id="historyTab" onclick="showTab('history')">History</button></nav>
  </main>
</div>
<script>
const K={profile:'sa_profile_v1',punches:'sa_punches_v1'};let unlocked=false;
const $=id=>document.getElementById(id), profile=()=>JSON.parse(localStorage.getItem(K.profile)||'null'), punches=()=>JSON.parse(localStorage.getItem(K.punches)||'[]');
function b64(buf){return btoa(String.fromCharCode(...new Uint8Array(buf))).replaceAll('+','-').replaceAll('/','_').replaceAll('=','')}
function unb64(s){s=s.replaceAll('-','+').replaceAll('_','/');while(s.length%4)s+='=';return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}
async function hashPin(pin,salt){const data=new TextEncoder().encode(salt+':'+pin);return b64(await crypto.subtle.digest('SHA-256',data))}
function random(n=32){const a=new Uint8Array(n);crypto.getRandomValues(a);return a}
function msg(id,text,cls='error'){ $(id).innerHTML=text?`<div class="notice ${cls}">${text}</div>`:'' }
function boot(){if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});tick();setInterval(tick,1000);const p=profile();if(!p){$('enrol').classList.remove('hidden')}else{$('welcome').textContent=`Welcome back, ${p.name}`;$('lock').classList.remove('hidden');if(!window.PublicKeyCredential)$('bioUnlock').classList.add('hidden')}}
function tick(){const d=new Date();$('clock').textContent=d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});$('date').textContent=d.toLocaleDateString([],{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
async function enrol(){msg('enrolMsg','');const name=$('name').value.trim(),employeeId=$('employeeId').value.trim(),pin=$('newPin').value,confirm=$('confirmPin').value;if(!name||!employeeId)return msg('enrolMsg','Enter the employee name and number.');if(!/^\d{6}$/.test(pin)||pin!==confirm)return msg('enrolMsg','Use matching 6-digit PINs.');const salt=b64(random(16)),pinHash=await hashPin(pin,salt);let credentialId=null;if(window.PublicKeyCredential&&location.protocol==='https:'){try{const c=await navigator.credentials.create({publicKey:{challenge:random(),rp:{name:'Secure Attendance'},user:{id:random(16),name:employeeId,displayName:name},pubKeyCredParams:[{alg:-7,type:'public-key'},{alg:-257,type:'public-key'}],authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required'},timeout:60000,attestation:'none'}});credentialId=b64(c.rawId)}catch(e){if(!confirm('Biometric enrolment was cancelled or unavailable. Continue with PIN only?'))return}}localStorage.setItem(K.profile,JSON.stringify({name,employeeId,salt,pinHash,credentialId,createdAt:new Date().toISOString()}));localStorage.setItem(K.punches,'[]');$('enrol').classList.add('hidden');openMain();}
async function biometricVerify(){const p=profile();if(!p?.credentialId||!window.PublicKeyCredential)throw new Error('Biometrics are not enrolled on this device.');await navigator.credentials.get({publicKey:{challenge:random(),allowCredentials:[{id:unb64(p.credentialId),type:'public-key',transports:['internal']}],userVerification:'required',timeout:60000}});return true}
async function unlockBiometric(){msg('lockMsg','');try{await biometricVerify();$('lock').classList.add('hidden');openMain()}catch(e){msg('lockMsg','Biometric verification failed. Use your PIN or try again.')}}
async function unlockPin(){msg('lockMsg','');const p=profile(),pin=$('pin').value;if(await hashPin(pin,p.salt)!==p.pinHash)return msg('lockMsg','Incorrect PIN.');$('pin').value='';$('lock').classList.add('hidden');openMain()}
function openMain(){unlocked=true;$('main').classList.remove('hidden');const p=profile();$('employeeName').textContent=p.name;$('employeeCode').textContent=`Employee ${p.employeeId}`;render()}
function lockApp(){unlocked=false;$('main').classList.add('hidden');$('lock').classList.remove('hidden')}
function currentState(){const a=punches();return a.length&&a[0].type==='IN'?'IN':'OUT'}
async function punch(){msg('punchMsg','');const p=profile();if(p.credentialId){try{await biometricVerify()}catch(e){return msg('punchMsg','Identity verification failed. No attendance was recorded.')}}else{const pin=prompt('Enter your 6-digit attendance PIN');if(!pin||await hashPin(pin,p.salt)!==p.pinHash)return msg('punchMsg','Incorrect PIN. No attendance was recorded.')}const type=currentState()==='IN'?'OUT':'IN',a=punches();a.unshift({id:crypto.randomUUID?.()||String(Date.now()),type,timestamp:new Date().toISOString(),verified:p.credentialId?'BIOMETRIC':'PIN'});localStorage.setItem(K.punches,JSON.stringify(a));msg('punchMsg',type==='IN'?'Clock-in recorded successfully.':'Clock-out recorded successfully.','ok');render()}
function weekStart(){const d=new Date(),day=(d.getDay()+6)%7;d.setHours(0,0,0,0);d.setDate(d.getDate()-day);return d}
function weekly(){return punches().filter(x=>new Date(x.timestamp)>=weekStart())}
function duration(list){let ms=0,inTime=null;[...list].reverse().forEach(x=>{if(x.type==='IN')inTime=new Date(x.timestamp);else if(inTime){ms+=new Date(x.timestamp)-inTime;inTime=null}});return ms}
function fmt(ms){const m=Math.floor(ms/60000);return `${Math.floor(m/60)}h ${String(m%60).padStart(2,'0')}m`}
function render(){const state=currentState();$('status').textContent=state==='IN'?'Currently clocked in':'Not clocked in';$('punchButton').textContent=state==='IN'?'Clock Out':'Clock In';$('punchButton').className='btn '+(state==='IN'?'danger':'success');const w=weekly();$('weekHours').textContent=fmt(duration(w));$('weekPunches').textContent=w.length;const h=$('history');h.innerHTML=w.length?w.map(x=>`<div class="row"><div><div class="type">${x.type==='IN'?'Clock In':'Clock Out'}</div><div class="time">${new Date(x.timestamp).toLocaleDateString([],{weekday:'short',day:'numeric',month:'short'})}</div></div><div style="text-align:right"><b>${new Date(x.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</b><div class="time">${x.verified}</div></div></div>`).join(''):'<div class="empty">No punches recorded this week.</div>'}
function showTab(t){$('clockView').classList.toggle('hidden',t!=='clock');$('historyView').classList.toggle('hidden',t!=='history');$('clockTab').classList.toggle('active',t==='clock');$('historyTab').classList.toggle('active',t==='history');render()}
function exportData(){const blob=new Blob([JSON.stringify({profile:{name:profile().name,employeeId:profile().employeeId},punches:punches()},null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='attendance-backup.json';a.click();URL.revokeObjectURL(a.href)}
document.addEventListener('visibilitychange',()=>{if(document.hidden&&unlocked)lockApp()});boot();
</script>
</body></html>
